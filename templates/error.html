<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} - Gestao Financeira</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body class="auth-page">
    <main class="auth-shell" aria-labelledby="errorTitle">
      <section class="panel auth-panel">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Aviso</p>
            <h1 id="errorTitle">{{ title }}</h1>
          </div>
        </header>

        <div class="auth-form">
          <p class="status-message is-negative">{{ message }}</p>
          <a class="text-link" href="{{ url_for('index') }}">Voltar para o painel</a>
        </div>
      </section>
    </main>
  </body>
</html>
